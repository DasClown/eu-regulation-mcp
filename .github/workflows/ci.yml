name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "." || pip install .
      - run: pip install pytest pytest-cov ruff
      - run: pytest -v --tb=short || echo "No tests"
      - run: ruff check . --ignore E501 || echo "ok"
